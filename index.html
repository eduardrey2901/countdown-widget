<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cuenta atrás</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: nowrap;
    }

    #bizCount {
      font-size: 95px;
      font-weight: 800;
      color: #0E4194;
      line-height: 1;
    }

    @media (max-width: 680px) {
      .row { flex-direction: column; }
      #bizCount { font-size: 100px; }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="row">
      <div id="bizCount">…</div>
    </div>
  </div>

  <script>
    // ===============================
    //   CORRECCIÓN PRINCIPAL
    //   USAR FECHAS EN HORARIO LOCAL
    // ===============================

    function localDate(y, m, d) {
      // m = 1–12
      return new Date(y, m - 1, d);  // local time
    }

    function sameLocalDay(a, b) {
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    // ----------------------------------
    // CONFIGURACIÓN DEL RANGO A CONTAR
    // ----------------------------------
    const targetDate = localDate(2026, 7, 1);   // 1 julio 2026 local
    const countToday = true;
    const includeTarget = false;

    // ----------------------------------
    // FESTIVOS CATALUÑA 2026 (solo local)
    // ----------------------------------
    const catalunyaHolidays2026 = [
      localDate(2026,4,1),
      localDate(2026,4,2),
      localDate(2026,4,3),
      localDate(2026,4,6),
      localDate(2026,5,1),
      localDate(2026,6,22),
      localDate(2026,6,23),
      localDate(2026,6,24),
    ];

    function isHoliday(d) {
      return catalunyaHolidays2026.some(h => sameLocalDay(h, d));
    }

    function isWeekend(d) {
      const wd = d.getDay(); // 0 dom - 6 sab (LOCAL)
      return wd === 0 || wd === 6;
    }

    // ----------------------------------
    //     CÁLCULO DE DÍAS LABORABLES
    // ----------------------------------
    function businessDaysBetween(startDate, endDate) {
      const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const end   = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());

      let from = new Date(start);
      let to   = new Date(end);

      if (!countToday) from.setDate(from.getDate() + 1);
      if (!includeTarget) to.setDate(to.getDate() - 1);
      if (to < from) return 0;

      let count = 0;
      let cur = new Date(from);

      while (cur <= to) {
        if (!isWeekend(cur) && !isHoliday(cur)) {
          count++;
        }
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    }

    // ----------------------------------
    //       ACTUALIZAR EN PANTALLA
    // ----------------------------------
    function update() {
      const now = new Date();
      const biz = businessDaysBetween(now, targetDate);
      document.getElementById("bizCount").textContent = biz;
    }

    update();
    setInterval(update, 3600000); // refresco cada hora
  </script>

</body>
</html>
