<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cuenta atrás</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Segoe UI', Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Contenedor general */
    .row {
      display: flex;
      gap: 45px;
      align-items: flex-end;
    }

    /* Columnas para alinear números y textos */
    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Días grandes */
    #bizCount {
      font-size: 95px;
      font-weight: 800;
      color: #0E4194;
      line-height: 1;
    }

    /* Reloj */
    #clock {
      font-size: 55px;
      font-weight: 700;
      color: #0E4194;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    /* Etiquetas */
    .label {
      font-size: 22px;
      font-weight: 600;
      color: #0E4194;
      margin-top: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <!-- Perfectamente alineado -->
  <div class="row">
    
    <!-- Columna izquierda -->
    <div class="col">
      <div id="bizCount">…</div>
      <div class="label">días</div>
    </div>

    <!-- Columna derecha -->
    <div class="col">
      <div id="clock">--:--:--</div>
      <div class="label">hh:mm:ss</div>
    </div>

  </div>

  <script>
    // FECHA OBJETIVO
    const targetDate = new Date(2026, 6, 1, 0, 0, 0);

    function localDate(y, m, d) {
      return new Date(y, m - 1, d);
    }
    function sameLocalDay(a, b) {
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    const countToday = false;
    const includeTarget = false;

    // FESTIVOS 2026
    const catalunyaHolidays2026 = [
      localDate(2026,4,1),
      localDate(2026,4,2),
      localDate(2026,4,3),
      localDate(2026,4,6),
      localDate(2026,5,1),
      localDate(2026,6,22),
      localDate(2026,6,23),
      localDate(2026,6,24)
    ];

    function isHoliday(d) {
      return catalunyaHolidays2026.some(h => sameLocalDay(h, d));
    }
    function isWeekend(d) {
      const wd = d.getDay();
      return wd === 0 || wd === 6;
    }

    function businessDaysBetween(startDate, endDate) {
      const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const end   = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());

      let from = new Date(start);
      let to   = new Date(end);

      if (!countToday) from.setDate(from.getDate() + 1);
      if (!includeTarget) to.setDate(to.getDate() - 1);
      if (to < from) return 0;

      let count = 0;
      let cur = new Date(from);

      while (cur <= to) {
        if (!isWeekend(cur) && !isHoliday(cur)) count++;
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    }

    function updateDays() {
      const now = new Date();
      document.getElementById("bizCount").textContent =
        businessDaysBetween(now, targetDate);
    }

    // RELOJ
    function updateClock() {
      const now = new Date();
      const diffMs = targetDate - now;

      const offsetNow = now.getTimezoneOffset();
      const offsetTarget = targetDate.getTimezoneOffset();
      const dstDeltaMs = (offsetNow - offsetTarget) * 60 * 1000;

      const adjDiffMs = diffMs + dstDeltaMs;

      const totalSec = Math.max(0, Math.floor(adjDiffMs / 1000));
      const sec = totalSec % 60;
      const min = Math.floor(totalSec / 60) % 60;
      const hour = Math.floor(totalSec / 3600) % 24;

      document.getElementById("clock").textContent =
        String(hour).padStart(2, "0") + ":" +
        String(min).padStart(2, "0") + ":" +
        String(sec).padStart(2, "0");
    }

    updateDays();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(updateDays, 3600000);
  </script>

</body>
</html>
