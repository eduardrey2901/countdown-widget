<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cuenta atrás</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* evita scroll en iObeya */
      background: #FFFFFF;
      font-family: 'Segoe UI', Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center; /* centra verticalmente */
    }
/*
    sombra de la tarjeta
    .card {
      background: #fff;
      padding: 40px 60px;
      border-radius: 22px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 920px;
      width: 90%;
    }
*/
    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: nowrap;
    }

    #bizCount {
      font-size: 95px;
      font-weight: 800;
      color: #0E4194;
      line-height: 1;
    }
/*
    .label-inline {
      font-size: 32px;
      color: #444;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }
*/
    @media (max-width: 680px) {
      .row { flex-direction: column; }
      #bizCount { font-size: 100px; }
      .label-inline { font-size: 26px; }
    }
  </style>
</head>

<body>
  
  <div class="card">
    <div class="row">
      <div id="bizCount">…</div>
      /*<div class="label-inline">días laborables</div>*/
    </div>
  </div>

  <script>
    // ===== CONFIGURACIÓN =====
    const targetDate = new Date("2026-07-01T00:00:00");
    const countToday = false;
    const includeTarget = false;

    // Festivos oficiales Cataluña 2026 (nacionales + autonómicos)
    const catalunyaHolidays2026 = [
      "2026-01-01","2026-01-06","2026-04-01","2026-04-02","2026-04-03","2026-04-06",
      "2026-05-01","2026-06-22","2026-06-23","2026-06-24","2026-08-15","2026-09-11",
      "2026-10-12","2026-12-08","2026-12-25","2026-12-26"
    ];
    const holidaySetsByYear = { 2026: new Set(catalunyaHolidays2026) };

    function toISODate(d) {
      return d.toISOString().slice(0, 10);
    }

    function isWeekend(d) {
      return d.getDay() === 0 || d.getDay() === 6;
    }

    function isHoliday(d) {
      const set = holidaySetsByYear[d.getFullYear()];
      return set && set.has(toISODate(d));
    }

    function businessDaysBetween(startDate, endDate) {
      const start = new Date(startDate); start.setHours(0,0,0,0);
      const end   = new Date(endDate);   end.setHours(0,0,0,0);

      let from = new Date(start);
      let to   = new Date(end);

      if (!countToday) from.setDate(from.getDate() + 1);
      if (!includeTarget) to.setDate(to.getDate() - 1);

      if (to < from) return 0;

      let count = 0;
      const d = new Date(from);

      while (d <= to) {
        if (!isWeekend(d) && !isHoliday(d)) count++;
        d.setDate(d.getDate() + 1);
      }

      return count;
    }

    function update() {
      const now = new Date();
      const biz = businessDaysBetween(now, targetDate);
      document.getElementById("bizCount").textContent = biz;
    }

    update();
    setInterval(update, 3600000); // refresco cada hora
  </script>

</body>
</html>
